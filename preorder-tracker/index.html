<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#c991e8" />
    <title>預購追蹤本</title>

    <script>
      window.APP_VERSION = "20260313-01";
    </script>

    <link rel="manifest" href="manifest.json?v=20260313-01" />
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <link rel="stylesheet" href="styles.css?v=20260313-01" />
  </head>
  <body>
    <div class="app-shell">
      <div class="top-notch"></div>
      <main id="app-main" class="screen-container">
        <section id="screen-home" class="screen active"></section>
        <section id="screen-list" class="screen"></section>
        <section id="screen-calendar" class="screen"></section>
        <section id="screen-add" class="screen"></section>
      </main>

      <button id="floating-add" class="floating-add clay-button" aria-label="新增商品">+</button>

      <nav class="bottom-nav" aria-label="主要導覽">
        <button data-screen="home" class="nav-btn active"><span>⌂</span><small>首頁</small></button>
        <button data-screen="list" class="nav-btn"><span>☰</span><small>清單</small></button>
        <button data-screen="calendar" class="nav-btn"><span>☷</span><small>月曆</small></button>
        <button data-screen="add" class="nav-btn"><span>＋</span><small>新增</small></button>
      </nav>
    </div>

    <dialog id="detail-modal" class="detail-modal">
      <article id="detail-content"></article>
      <form method="dialog"><button class="clay-button">關閉</button></form>
    </dialog>

    <script type="module">
      import(`./app.js?v=${window.APP_VERSION}`);
    </script>
  </body>
</html>
